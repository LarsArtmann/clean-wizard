version: "2"
run:
  timeout: 10m
  go: 1.26.1
  build-tags:
    - goexperiment.arenas
    - goexperiment.goroutineleakprofile
    - goexperiment.jsonv2
    - goexperiment.runtimesecret
    - goexperiment.simd
  modules-download-mode: readonly
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  settings:
    cyclop:
      max-complexity: 15
  default: none
  exclusions:
    rules:
      - path: ".*_test\\.go"
        linters:
          - cyclop
  enable:
    - cyclop
formatters:
  settings:
    enable:
      - gci
      - goimports
      - gofumpt
      - golines
