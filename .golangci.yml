version: "2"
run:
  timeout: 5m
  go: 1.26.1
  build-tags: []
  modules-download-mode: readonly
  allow-parallel-runners: true
  allow-serial-runners: false
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    - prealloc
    - godot
    - staticcheck
    - unconvert
    - unparam
    - exptostd
    - errname
    - misspell
    - wastedassign
    - contextcheck
    - goconst
    - usetesting
    - copyloopvar
    - nolintlint
    - nilnesserr
    - gocyclo
    - intrange
    - testifylint
    - unused
    - gocritic
    - bodyclose
    - dupl
    - nilnil
    - reassign
    - errcheck
    - rowserrcheck
    - cyclop
    - wrapcheck
    - gosec
    - errorlint
    - modernize
    - thelper
    - dogsled
    - exhaustive
    - ineffassign
    - predeclared
    - nilerr
    - ginkgolinter
    - govet
  settings:
    cyclop:
      max-complexity: 20
    dupl:
      threshold: 150
    errcheck:
      check-blank: false
      check-type-assertions: false
    goconst:
      min-len: 5
      min-occurrences: 4
    gocyclo:
      min-complexity: 20
    gosec:
      excludes:
        - G115 # integer overflow conversion - common in size calculations
        - G204 # subprocess launched with variable - intentional for CLI tools
        - G304 # file inclusion via variable - intentional for config files
        - G703 # path traversal - intentional for disk cleaner
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1005
        - -SA9003
    wrapcheck:
      ignore-sig-globs:
        - github.com/LarsArtmann/clean-wizard/* # internal packages don't need wrapping
        - github.com/caarlos0/env/* # env parsing errors are self-explanatory
        - github.com/go-resty/resty/* # HTTP client errors are self-explanatory
        - os/exec.* # command execution errors are self-explanatory
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - staticcheck
          - wrapcheck
          - gosec
          - unconvert
          - unparam
          - dupl
          - gocyclo
          - goconst
      - path: _ginkgo_test\.go
        linters:
          - errcheck
          - staticcheck
          - wrapcheck
          - gosec
          - unconvert
          - unparam
          - dupl
          - gocyclo
          - goconst
      - path: tests/
        linters:
          - errcheck
          - staticcheck
          - wrapcheck
          - gosec
          - unconvert
          - unparam
          - dupl
          - gocyclo
          - goconst
    paths:
      - tests
      - test/testdata_etc
      - vendor
      - .git
formatters:
  enable:
    - goimports
    - gofmt
    - golines
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
