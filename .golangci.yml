version: "2"
run:
  timeout: 10m
  go: 1.26.2
  build-tags:
    - goexperiment.arenas
    - goexperiment.runtimesecret
  modules-download-mode: readonly
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  disable:
    - exhaustruct
    - gochecknoglobals
    - paralleltest
    - recvcheck
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - cyclop
    - dupl
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - gocritic
    - gocyclo
    - gosec
    - gosmopolitan
    - govet
    - ineffassign
    - interfacebloat
    - intrange
    - loggercheck
    - maintidx
    - mirror
    - misspell
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - perfsprint
    - prealloc
    - predeclared
    - protogetter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - thelper
    - unconvert
    - unparam
    - unused
    - usetesting
    - wastedassign
    - wrapcheck
    - zerologlint
  default: none
  settings:
    cyclop:
      max-complexity: 15
    funlen:
      lines: 100
      statements: 60
    gocognit:
      min-complexity: 50
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
    gosec:
      excludes:
        - G115
        - G118
        - G204
        - G301
        - G304
        - G306
        - G703
    nestif:
      min-complexity: 7
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    wrapcheck:
      ignorePackageGlobs:
        - github.com/LarsArtmann/clean-wizard/internal/*
        - encoding/*
        - os
        - time
        - charm.land/*
  exclusions:
    rules:
      - path: .*_test\.go
        linters:
          - cyclop
          - gosec
          - wrapcheck
      - path: .*_test\.go
        linters:
          - revive
        text: "unused-parameter|empty-block"
      - path: tests/bdd/.*\.go
        linters:
          - revive
        text: "unused-parameter"
      - path: internal/cleaner/testing_helpers\.go
        linters:
          - revive
        text: "unused-parameter"
      - path: internal/cleaner/test_factories\.go
        linters:
          - revive
        text: "unused-parameter"
      - path: internal/domain/enum_macros\.go
        linters:
          - wrapcheck
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
  settings:
    enable:
      - gci
      - goimports
      - gofumpt
      - golines
issues: {}
