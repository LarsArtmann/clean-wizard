version: "2"
run:
  timeout: 5m
  go: "1.25"
  build-tags: []
  modules-download-mode: readonly
  allow-parallel-runners: true
  allow-serial-runners: false
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    # Core quality linters (must have)
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - errorlint

    # Bug detection
    - errname
    - nilerr
    - wrapcheck
    - contextcheck

    # Style & best practices
    - gocritic
    - goconst
    - prealloc
    - copyloopvar

    # Performance
    - wastedassign
    - usestdlibvars

    # Code structure
    - nonamedreturns
    - cyclop
    - gocyclo

    # Type checking
    - exhaustive
    - iface

    # Other
    - bodyclose
    - misspell
    - dupword
    - nakedret
    - makezero
    - mirror
    - nlreturn
    - noinlineerr
    - nolintlint
    - perfsprint
    - unconvert

  default: none
  settings:
    errcheck:
      check-blank: false
      check-type-assertions: false
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1005
        - -SA9003
    gocyclo:
      min-complexity: 20
    cyclop:
      max-complexity: 20
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - staticcheck
          - noinlineerr
      - path: _ginkgo_test\.go
        linters:
          - errcheck
          - staticcheck
          - noinlineerr
      - path: tests/
        linters:
          - errcheck
          - staticcheck
    paths:
      - tests
      - test/testdata_etc
      - vendor
      - .git
formatters:
  enable:
    - gofmt
    - goimports
issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 10
  new: false
