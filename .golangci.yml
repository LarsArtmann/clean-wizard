version: "2"
run:
  timeout: 5m
  go: 1.26.1
  build-tags:
    - goexperiment.goroutineleakprofile
    - goexperiment.jsonv2
    - goexperiment.simd
  modules-download-mode: readonly
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - noinlineerr
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
  settings:
    cyclop:
      max-complexity: 20
    # depguard:
    #   packages:
    #     - github.com/LarsArtmann/clean-wizard/...
    #   rules:
    #     main:
    #       allow:
    #         - all
    dupl:
      threshold: 150
    errcheck:
      check-blank: false
      check-type-assertions: false
    goconst:
      min-len: 5
      min-occurrences: 4
    gocyclo:
      min-complexity: 20
    gosec:
      excludes:
        - G115
        - G204
        - G304
        - G703
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1005
        - -SA9003
    wrapcheck:
      ignore-package-globs:
        - github.com/LarsArtmann/clean-wizard/*
        - github.com/caarlos0/env/*
        - github.com/go-resty/resty/*
        - os/exec.*
    testpackage:
      name: "test"
      path-patterns:
        - "**/*_test.go"
    thelper:
      test-file-pattern: ".*_test\\.go"
    tparallel:
      require-examples: true
  exclusions:
    rules:
      - path: _test\\.go
        linters:
          - errcheck
          - errname
          - errorlint
          - exhaustive
          - forbidigo
          - forcetypeassert
          - funlen
          - gosec
          - inamedparam
          - ireturn
          - mnd
          - nestif
          - nonamedreturns
          - noinlineerr
          - prealloc
          - revive
          - gocritic
          - gomoddirectives
          - gosec
          - interfacebloat
          - musttag
          - recvcheck
          - tagliatelle
      - path: _ginkgo_test\\.go
        linters:
          - errcheck
          - errname
          - errorlint
          - exhaustive
          - forbidigo
          - forcetypeassert
          - funlen
          - gosec
          - inamedparam
          - ireturn
          - mnd
          - nestif
          - nonamedreturns
          - noinlineerr
          - prealloc
          - revive
          - gocritic
          - gomoddirectives
          - gosec
          - interfacebloat
          - musttag
          - recvcheck
          - tagliatelle
      - path: tests/
        linters:
          - errcheck
          - errname
          - errorlint
          - exhaustive
          - forbidigo
          - forcetypeassert
          - funlen
          - gosec
          - inamedparam
          - ireturn
          - mnd
          - nestif
          - nonamedreturns
          - noinlineerr
          - prealloc
          - revive
          - gocritic
          - gomoddirectives
          - gosec
          - interfacebloat
          - musttag
          - recvcheck
          - tagliatelle
    paths:
      - tests
      - test/testdata_etc
      - vendor
      - .git
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    - path: _test\\.go
      linters:
        - errcheck
        - staticcheck
        - wrapcheck
        - gosec
        - unconvert
        - unparam
        - dupl
        - gocyclo
        - goconst
    - path: _ginkgo_test\\.go
      linters:
        - errcheck
        - staticcheck
        - wrapcheck
        - gosec
        - unconvert
        - unparam
        - dupl
        - gocyclo
        - goconst
    - path: tests/
      linters:
        - errcheck
        - staticcheck
        - wrapcheck
        - gosec
        - unconvert
        - unparam
        - dupl
        - gocyclo
        - goconst