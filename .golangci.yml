version: "2"
run:
  timeout: 5m
  go: "1.25"
  build-tags: []
  modules-download-mode: readonly
  allow-parallel-runners: true
  allow-serial-runners: false
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    # Critical - Security & Correctness
    - gosec
    - unused
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - gocritic
    - errorlint
    - contextcheck
    - nilnesserr
    - bodyclose
    - rowserrcheck

    # Code Quality
    - gocyclo
    - cyclop
    - dupl
    - goconst
    - unconvert
    - prealloc
    - predeclared
    - unparam

    # Modern Go Practices
    - usetesting
    - copyloopvar
    - intrange
    - exptostd
    - modernize

    # Error Handling
    - wrapcheck
    - errname
    - nilnil
    - nilerr

    # Testing
    - testifylint
    - ginkgolinter
    - thelper

    # Misc Quality
    - misspell
    - godot
    - nolintlint
    - reassign
    - wastedassign
    - dogsled
    - exhaustive
  disable:
    # Disabled - Too Strict/Noisy
    - exhaustruct
    - testpackage
    - gochecknoglobals
    - varnamelen
    - tagliatelle
    - paralleltest
    - funlen
    - err113
    - revive
    - forbidigo
    - mnd
    - funcorder
    - ireturn
    - godox
    - depguard
    - tagalign
    - gomodguard
    - importas
    - gochecknoinits
    - nonamedreturns
    - nosprintfhostport
    - canonicalheader
    - gosmopolitan
    - nestif
    - gocognit
    - maintidx
    - interfacebloat
    - fatcontext
    - containedctx
    - protogetter
    - gochecksumtype
    - sqlclosecheck
    - gocheckcompilerdirectives
    - asciicheck
    - promlinter
    - arangolint
    - embeddedstructfieldcheck
    - decorder
    - godoclint
    - forcetypeassert
    - zerologlint
    - goprintffuncname
    - recvcheck
    - perfsprint
    - nakedret
    - iotamixing
    - errchkjson
    - makezero
    - sloglint
    - spancheck
    - nlreturn
    - noinlineerr
    - musttag
    - whitespace
    - grouper
    - testableexamples
    - goheader
    - durationcheck
    - iface
    - loggercheck
    - dupword
    - mirror
    - noctx
    - tparallel
    - bidichk
  settings:
    cyclop:
      max-complexity: 20
    gocyclo:
      min-complexity: 20
    errcheck:
      check-blank: false
      check-type-assertions: false
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1005
        - -SA9003
    goconst:
      min-len: 5
      min-occurrences: 4
    dupl:
      threshold: 150
    wrapcheck:
      ignorePackageGlobs:
        - github.com/LarsArtmann/clean-wizard/*
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - staticcheck
          - wrapcheck
          - gosec
      - path: _ginkgo_test\.go
        linters:
          - errcheck
          - staticcheck
          - wrapcheck
          - gosec
      - path: tests/
        linters:
          - errcheck
          - staticcheck
          - wrapcheck
          - gosec
    paths:
      - tests
      - test/testdata_etc
      - vendor
      - .git
formatters:
  enable:
    - goimports
    - gofmt
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
