version: "2"
run:
  timeout: 5m
  go: "1.25"
  modules-download-mode: readonly
  allow-parallel-runners: true
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  default: none
  enable:
    - errcheck
    - ineffassign
    - nilerr
    - staticcheck
    - govet
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    staticcheck:
      checks: ["all", "-ST1000", "-ST1003", "-ST1005", "-SA9003"]
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - staticcheck
      - path: _ginkgo_test\.go
        linters:
          - errcheck
          - staticcheck
    paths:
      - tests
      - test/testdata_etc
