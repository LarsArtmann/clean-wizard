version: "2"
run:
  timeout: 5m
  go: "1.25"
  build-tags: []
  modules-download-mode: readonly
  allow-parallel-runners: true
  allow-serial-runners: false
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    - embeddedstructfieldcheck
    - forcetypeassert
    - gosmopolitan
    - grouper
    - durationcheck
    - exptostd
    - fatcontext
    - govet
    - gocritic
    - dupword
    - asciicheck
    - godox
    - gocyclo
    - exhaustive
    - importas
    - sqlclosecheck
    - spancheck
    - testifylint
    - usetesting
    - errcheck
    - misspell
    - noinlineerr
    - nolintlint
    - tagliatelle
    - unqueryvet
    - whitespace
    - asasalint
    - exhaustruct
    - gochecksumtype
    - gomoddirectives
    - nestif
    - perfsprint
    - godoclint
    - mnd
    - inamedparam
    - intrange
    - nosprintfhostport
    - revive
    - varnamelen
    - errorlint
    - errname
    - makezero
    - arangolint
    - reassign
    - cyclop
    - containedctx
    - goprintffuncname
    - protogetter
    - gochecknoglobals
    - nonamedreturns
    - bodyclose
    - godot
    - recvcheck
    - unparam
    - forbidigo
    - usestdlibvars
    - mirror
    - nlreturn
    - depguard
    - interfacebloat
    - predeclared
    - testpackage
    - nakedret
    - gocognit
    - err113
    - gomodguard
    - thelper
    - tparallel
    - wsl_v5
    - copyloopvar
    - iface
    - unconvert
    - ginkgolinter
    - zerologlint
    - decorder
    - dupl
    - gochecknoinits
    - ireturn
    - maintidx
    - paralleltest
    - testableexamples
    - ineffassign
    - bidichk
    - iotamixing
    - lll
    - rowserrcheck
    - wrapcheck
    - goconst
    - funcorder
    - nilnesserr
    - nilnil
    - promlinter
    - tagalign
    - staticcheck
    - wastedassign
    - canonicalheader
    - dogsled
    - funlen
    - gocheckcompilerdirectives
    - goheader
    - modernize
    - unused
    - nilerr
    - contextcheck
    - prealloc
  default: none
  settings:
    cyclop:
      max-complexity: 20
    errcheck:
      check-blank: false
      check-type-assertions: false
    gocyclo:
      min-complexity: 20
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1005
        - -SA9003
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - staticcheck
          - noinlineerr
      - path: _ginkgo_test\.go
        linters:
          - errcheck
          - staticcheck
          - noinlineerr
      - path: tests/
        linters:
          - errcheck
          - staticcheck
    paths:
      - tests
      - test/testdata_etc
      - vendor
      - .git
formatters:
  enable:
    - goimports
    - golines
    - gofmt
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
