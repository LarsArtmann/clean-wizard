version: "2"
run:
    timeout: 5m
    go: 1.26.1
    build-tags: []
    modules-download-mode: readonly
    allow-parallel-runners: true
    allow-serial-runners: false
    issues-exit-code: 1
    tests: true
output:
    formats: {}
linters:
    enable:
        - prealloc
        - copyloopvar
        - nilnesserr
        - gocyclo
        - unused
        - cyclop
        - exhaustruct
        - forcetypeassert
        - intrange
        - errorlint
        - interfacebloat
        - musttag
        - nestif
        - perfsprint
        - unparam
        - errname
        - errcheck
        - mirror
        - govet
        - gochecknoglobals
        - maintidx
        - wastedassign
        - gocritic
        - dogsled
        - gochecksumtype
        - protogetter
        - recvcheck
        - sqlclosecheck
        - staticcheck
        - dupl
        - gosec
        - predeclared
        - contextcheck
        - reassign
        - gocognit
        - noctx
        - nolintlint
        - revive
        - spancheck
        - ineffassign
        - unconvert
        - misspell
        - nilnil
        - nilerr
        - gosmopolitan
        - paralleltest
        - loggercheck
        - exptostd
        - usetesting
        - testifylint
        - bodyclose
        - modernize
        - ginkgolinter
        - gochecknoinits
        - wrapcheck
        - thelper
        - errchkjson
        - sloglint
        - godot
        - goconst
        - nakedret
        - zerologlint
        - rowserrcheck
        - exhaustive
        - durationcheck
        - funlen
    settings:
        cyclop:
            max-complexity: 20
        dupl:
            threshold: 150
        errcheck:
            check-blank: false
            check-type-assertions: false
        goconst:
            min-len: 5
            min-occurrences: 4
        gocyclo:
            min-complexity: 20
        gosec:
            excludes:
                - G115
                - G204
                - G304
                - G703
        staticcheck:
            checks:
                - all
                - -ST1000
                - -ST1003
                - -ST1005
                - -SA9003
        wrapcheck:
            ignore-sig-globs:
                - github.com/LarsArtmann/clean-wizard/*
                - github.com/caarlos0/env/*
                - github.com/go-resty/resty/*
                - os/exec.*
    exclusions:
        rules:
            - path: _test\.go
              linters:
                - errcheck
                - staticcheck
                - wrapcheck
                - gosec
                - unconvert
                - unparam
                - dupl
                - gocyclo
                - goconst
            - path: _ginkgo_test\.go
              linters:
                - errcheck
                - staticcheck
                - wrapcheck
                - gosec
                - unconvert
                - unparam
                - dupl
                - gocyclo
                - goconst
            - path: tests/
              linters:
                - errcheck
                - staticcheck
                - wrapcheck
                - gosec
                - unconvert
                - unparam
                - dupl
                - gocyclo
                - goconst
        paths:
            - tests
            - test/testdata_etc
            - vendor
            - .git
formatters:
    enable:
        - goimports
        - gofmt
        - golines
issues:
    max-issues-per-linter: 50
    max-same-issues: 10
