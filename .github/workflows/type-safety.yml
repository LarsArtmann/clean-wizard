name: CI
description: Build, test, and type safety validation for all code changes

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -short -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  type-safety:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Type Safety Linting
        run: |
          echo "Type safety validation..."

          # 1. Check for map[string]any violations
          if grep -r "map\[string\]any" internal/ --include="*.go" --exclude-dir=vendor; then
            echo "VIOLATION: map[string]any found"
            exit 1
          fi
          echo "OK: No map[string]any violations"

          # 2. Check for interface{} abuse
          if grep -r "interface{}" internal/ --include="*.go" --exclude-dir=vendor; then
            echo "VIOLATION: interface{} found"
            exit 1
          fi
          echo "OK: No interface{} violations"

          # 3. Check for unsafe package usage
          if grep -r "unsafe\." internal/ --include="*.go" --exclude-dir=vendor; then
            echo "VIOLATION: unsafe package usage"
            exit 1
          fi
          echo "OK: No unsafe package violations"

          # 4. Check for reflect package usage (requires explicit justification)
          if grep -r "reflect\." internal/ --include="*.go" --exclude-dir=vendor; then
            echo "VIOLATION: reflect package usage"
            echo "If reflection is necessary, add // REFLECT-JUSTIFIED: <reason> comment"
            exit 1
          fi
          echo "OK: No reflect package violations"

      - name: Dependency Cycle Check
        run: |
          go install github.com/fzipp/gocycmd/cmd/gocycmd@latest
          if ! gocycmd ./...; then
            echo "VIOLATION: Dependency cycle detected"
            exit 1
          fi
          echo "OK: No dependency cycles"
