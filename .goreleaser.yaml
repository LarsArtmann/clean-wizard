# GoReleaser configuration
# Documentation: https://goreleaser.com

version: 2

project_name: clean-wizard

before:
  hooks:
    - go mod tidy

builds:
  - id: clean-wizard
    main: ./cmd/clean-wizard
    binary: clean-wizard
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: 386
      - goos: windows
        goarch: arm64
    tags:
      - netgo
      - osusergo
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.builtBy=goreleaser

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
        {{- else if eq .Arch "386" }}i386
        {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--oidc-issuer=https://token.actions.githubusercontent.com"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: all
    output: true

sboms:
  - artifacts: archive

brews:
  - name: clean-wizard
    homepage: https://github.com/LarsArtmann/clean-wizard
    description: "Comprehensive CLI/TUI tool for system cleanup"
    license: MIT
    repository:
      owner: LarsArtmann
      name: homebrew-tap
    folder: Formula
    commit_author:
      name: goreleaserbot
      email: goreleaser@larsartmann.com
    install: |
      bin.install "clean-wizard"
    test: |
      system "#{bin}/clean-wizard --version"

dockers:
  - image_templates:
      - "ghcr.io/larsartmann/clean-wizard:{{ .Tag }}-amd64"
    dockerfile: Dockerfile
    goarch: amd64
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
      - "--platform=linux/amd64"
  - image_templates:
      - "ghcr.io/larsartmann/clean-wizard:{{ .Tag }}-arm64"
    dockerfile: Dockerfile
    goarch: arm64
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/larsartmann/clean-wizard:{{ .Tag }}"
    image_templates:
      - "ghcr.io/larsartmann/clean-wizard:{{ .Tag }}-amd64"
      - "ghcr.io/larsartmann/clean-wizard:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/larsartmann/clean-wizard:v{{ .Major }}"
    image_templates:
      - "ghcr.io/larsartmann/clean-wizard:{{ .Tag }}-amd64"
      - "ghcr.io/larsartmann/clean-wizard:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/larsartmann/clean-wizard:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/larsartmann/clean-wizard:{{ .Tag }}-amd64"
      - "ghcr.io/larsartmann/clean-wizard:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/larsartmann/clean-wizard:latest"
    image_templates:
      - "ghcr.io/larsartmann/clean-wizard:{{ .Tag }}-amd64"
      - "ghcr.io/larsartmann/clean-wizard:{{ .Tag }}-arm64"


nfpms:
  - id: default
    package_name: clean-wizard
    file_name_template: "{{ .ConventionalFileName }}
    homepage: https://github.com/LarsArtmann/clean-wizard
    description: "Comprehensive CLI/TUI tool for system cleanup"
    license: MIT
    maintainer: "Lars Artmann <lars@larsartmann.com>"
    formats:
      - deb
      - rpm
      - apk
    contents:
      - src: LICENSE
        dst: /usr/share/doc/clean-wizard/LICENSE
      - src: README.md
        dst: /usr/share/doc/clean-wizard/README.md
    deb:
      fields:
        Bugs: https://github.com/LarsArtmann/clean-wizard/issues
nix:
  - name: clean-wizard
    repository:
      owner: LarsArtmann
      name: nur-packages
    homepage: https://github.com/LarsArtmann/clean-wizard
    description: "Comprehensive CLI/TUI tool for system cleanup"
    license: mit
    formatter: nixfmt
    path: pkgs/clean-wizard/default.nix
    install: |
      mkdir -p $out/bin
      cp -vr ./{binary} $out/bin/clean-wizard


scoops:
  - name: clean-wizard
    repository:
      owner: LarsArtmann
      name: homebrew-tap
    folder: Scoop
    commit_author:
      name: goreleaserbot
      email: goreleaser@larsartmann.com
    homepage: "https://github.com/LarsArtmann/clean-wizard"
    description: "Comprehensive CLI/TUI tool for system cleanup"
    license: MIT

release:
  github:
    owner: LarsArtmann
    name: clean-wizard
  draft: false
  prerelease: auto
  name_template: "clean-wizard v{{.Version}}"
  footer: |
    ## Installation

    **Homebrew:**
    ```bash
    brew tap LarsArtmann/tap
    brew install clean-wizard
    ```

    **Nix:**
    ```bash
    nix run github:LarsArtmann/nur-packages#clean-wizard
    ```

    **Docker:**
    ```bash
    docker pull ghcr.io/larsartmann/clean-wizard:{{.Version}}
    ```

    Download the appropriate binary for your platform from the assets below.
